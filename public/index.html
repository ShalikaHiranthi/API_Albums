<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Albums</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
<div class="navbar">
  <h3 id="isadmin">Admin</h3>
  <a href="register.html" id="registerBtn">Register</a>
  <a href="#" id="logoutBtn">Logout</a>
  <a href="login.html" id="loginLink">Login</a>
</div>

<h2>Albums</h2>
  <!-- 🔹 Add Album Form -->
  <form id="albumForm">
    <input type="text" id="artist" placeholder="Artist" required />
    <input type="text" id="title" placeholder="Title" required />
    <input type="number" id="year" placeholder="Year" />
    <input type="text" id="genre" placeholder="Genre" />
    <input type="number" id="tracks" placeholder="Tracks" />
    <button type="submit">Add Album</button>
  </form>

  <hr/>

  <div id="albums" class="container"></div>

<script>
  const API_BASE = 'https://api-albums.onrender.com'
  const token = localStorage.getItem("token");

  async function loadAlbums() {
    try {
      let response;
      const logged = await isLoggedIn();
      //console.log(logged)
      if (!logged) {
        response = await fetch(`${API_BASE}/api/albums/all`);
      }
      else{
        if (logged == 'admin') {
          response = await fetch(`${API_BASE}/api/albums/all`);
        }else{
          response = await fetch(`${API_BASE}/api/albums`, {
          credentials: "include"
          });
        }
      }
      
      const albums = await response.json()
      displayAlbums(albums)
    } catch (error) {
      console.error('Error loading albums:', error)
    }
  }

  loadAlbums();

  document
    .getElementById("albumForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault(); 

      const albumData = {
        artist: document.getElementById("artist").value,
        title: document.getElementById("title").value,
        year: Number(document.getElementById("year").value),
        genre: document.getElementById("genre").value,
        tracks: Number(document.getElementById("tracks").value)
      };

      await addAlbum(albumData);

      e.target.reset();
    });

  async function addAlbum(albumData) {
    try {
      const response = await fetch(`${API_BASE}/api/albums`, {
        method: 'POST',
        credentials: "include",
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(albumData)
      })

      if (response.ok) {
        loadAlbums() // Refresh the list
      } else {
        console.error('Failed to add album')
      }
    } catch (error) {
      console.error('Error adding album:', error)
    }
  }

  async function displayAlbums(data) {
    //console.log(data);
    const logged = await isLoggedIn();
    const container = document.getElementById('albums')
    container.innerHTML = data.albums.map(album => `
      <div class="album">
        <h3><a href="/albums/${album._id}">${album.title}</a></h3>
        <p>Artist: ${album.artist}</p>
        <p>Year: ${album.year} | Genre: ${album.genre}</p>
        <p>Tracks: ${album.tracks}</p>
        ${logged ? `<button onclick="deleteAlbum('${album._id}')">Delete</button>` : ""}
      </div>
    `).join('')
  }

  async function deleteAlbum(id) {
      const confirmed = confirm("Are you sure you want to delete this album?");
      if (!confirmed) return;

      const response = await fetch(`${API_BASE}/api/albums/${id}?debug=true`, {
        method: "DELETE",
        credentials: "include"
      });
      //console.log(response);

      if (response.status === 200) {
        loadAlbums(); // refresh list
      } else if (response.status === 403) {
        alert("Debug mode required to delete albums");
      } else {
        alert("Failed to delete album");
      }
    }

  const logoutBtn = document.getElementById("logoutBtn");
  const loginLink = document.getElementById("loginLink");
  const registerBtn = document.getElementById("registerBtn");
  

  async function checkLogin() {
    const logged = await isLoggedIn();

    if (logged) {
      loginLink.style.display = "none";
      registerBtn.style.display = "none";
    } else {
      logoutBtn.style.display = "none";
      document.getElementById("albumForm").style.display = "none";
    }
    if (logged != 'admin') {
      document.getElementById("isadmin").style.display = "none";
    }
  }

  checkLogin();

async function isLoggedIn() {
  try {
    const res = await fetch(`${API_BASE}/api/me`, {
      method: "GET",
      credentials: "include"
    });

    const data = await res.json();
    //console.log(data.user);

    return {
      loggedIn: data.loggedIn,
      role: data.user?.role ?? null
    };

  } catch (err) {
    console.error("Login check error:", err);
    return false;
  }
}

document.getElementById("logoutBtn").addEventListener("click", async () => {

  try {
    const response = await fetch(`${API_BASE}/api/logout`, {
      method: "POST",
      credentials: "include"
    });

    const data = await response.json();

    if (response.ok) {
      location.reload();
    }

  } catch (error) {
    console.error("Logout error:", error);
  }

});

  

</script>

  
</body>
</html>

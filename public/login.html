<form id="loginForm">
  <input type="email" id="loginEmail" placeholder="Email" required />
  <input type="password" id="loginPassword" placeholder="Password" required />
  <button type="submit">Login</button>
</form>
<div id="loginMsg"></div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  const API_BASE = 'https://api-albums.onrender.com';

  try {
    const response = await fetch(`${API_BASE}/api/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include", // important for cookies
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();
    console.log(data);

    if (response.ok) {
      //window.location.href = `${API_BASE}`; // redirect after login
    } else {
      document.getElementById("loginMsg").innerText = data.msg || "Login failed";
    }

  } catch (err) {
    console.error(err);
    document.getElementById("loginMsg").innerText = "Server error";
  }
});
</script>
